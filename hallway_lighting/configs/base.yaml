project:
  name: hallway_lighting
  notebook_main: notebooks/hallway_illuminance_train_eval_all_in_one.ipynb
  runs_root: runs
  seed: 42

paths:
  dataset_config: configs/datasets.yaml
  train_config: configs/train.yaml
  infer_config: configs/infer.yaml
  carbon_config: configs/carbon.yaml

model:
  name: hallway_multitask_unet
  in_channels: 3
  encoder_channels: [32, 64, 128, 256]
  decoder_channels: [256, 128, 64, 32]
  heads:
    lux_map:
      out_channels: 1
    reflectance:
      out_channels: 1
    shading:
      out_channels: 1
    floor_mask:
      out_channels: 1
    uncertainty_log_var:
      out_channels: 1
    estimated_power:
      out_channels: 1
